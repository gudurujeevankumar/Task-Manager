{% extends 'base.html' %}

{% block title %}{{ title }} | TaskFlow{% endblock %}

{% block content %}
<div class="form-page-container">
    <div class="form-card glass-container">
        <h3 class="form-card-header">{{ title }}</h3>
        
        <form method="POST">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div style="color: var(--danger); font-size: 0.85rem; margin-top: 0.25rem;">
                            {{ field.errors }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}
            
            <div style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem;">
                <a href="{% url 'dashboard' %}" class="btn btn-secondary">
                    Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    Save Task
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
