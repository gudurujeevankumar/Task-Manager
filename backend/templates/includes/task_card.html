<div class="task-card">
    <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem;">
        <h4 class="task-title">{{ task.title }}</h4>
        <div class="task-actions">
            <!-- Edit Button -->
            <a href="{% url 'task_edit' task.pk %}" class="btn-icon-only" title="Edit Task">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
            </a>
            <!-- Delete Form -->
            <form action="{% url 'task_delete' task.pk %}" method="POST" style="display: inline;" onsubmit="return confirm('Are you sure you want to delete this task?');">
                {% csrf_token %}
                <button type="submit" class="btn-icon-only" style="color: rgba(239, 68, 68, 0.7); cursor: pointer;" title="Delete Task">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
            </form>
        </div>
    </div>
    
    <p class="task-desc">{% if task.description %}{{ task.description }}{% else %}<span style="font-style: italic; color: var(--text-muted);">No description.</span>{% endif %}</p>

    <div class="task-meta">
        <span>{{ task.created_at|date:"M d, Y" }}</span>
        
        <div class="task-stage-controls">
            {% if task.stage != 'todo' %}
                <a href="{% url 'task_move' task.pk 'left' %}" class="stage-btn" title="Move Back">←</a>
            {% endif %}
            {% if task.stage != 'done' %}
                <a href="{% url 'task_move' task.pk 'right' %}" class="stage-btn" title="Move Forward">→</a>
            {% endif %}
        </div>
    </div>
</div>
